<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа - LinkUp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        .group-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .group-avatar-large {
            width: 100px;
            height: 100px;
            background: #1e40af;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .group-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 12px;
            text-align: center;
            padding: 4px;
            display: none;
        }
        .group-avatar-large:hover .avatar-overlay {
            display: block;
        }
        .group-admin-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .edit-icon {
            cursor: pointer;
            margin-left: 10px;
            font-size: 18px;
            opacity: 0.7;
        }
        .edit-icon:hover {
            opacity: 1;
        }
        body.dark-theme .group-header {
            background: #1e293b !important;
            border-color: #334155 !important;
        }
        body.dark-theme .group-name {
            color: #e2e8f0 !important;
        }
        .group-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .member-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        body.dark-theme .member-item {
            background: #334155;
        }
        body.dark-theme .member-name {
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">LinkUp</a>
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
            <div class="nav-right">
                <button id="logoutBtn" class="logout-icon">🚪</button>
            </div>
            <div class="nav-center">
                <div class="nav-links">
                    <a href="index.html">Лента</a>
                    <a href="profile.html">Профиль</a>
                    <a href="messages.html">Сообщения <span id="messagesBadge" class="badge" style="display:none;"></span></a>
                    <a href="requests.html">Заявки <span id="requestsBadge" class="badge" style="display:none;"></span></a>
                    <a href="groups.html">Группы</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="groupContent"></div>
        <!-- Форма создания поста в группе -->
<div id="createPostForm" class="card" style="margin-bottom: 20px; display: none;">
    <h3>📝 Создать пост в группе</h3>
    <textarea id="groupPostText" rows="3" placeholder="Что у вас нового?" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 10px;"></textarea>
    
    <div style="margin: 10px 0;">
        <label class="add-photo-btn" style="display: inline-flex; align-items: center; gap: 8px; background: #f1f5f9; border: 1px dashed #1e40af; padding: 10px 16px; border-radius: 30px; cursor: pointer;">
            📷 Добавить фото
            <input type="file" id="groupPostImage" accept="image/*" style="display: none;">
        </label>
        <span id="groupFileName" style="margin-left: 10px; font-size: 13px; color: #64748b;">Файл не выбран</span>
    </div>
    
    <button id="createGroupPostBtn" class="btn btn-primary">Опубликовать</button>
</div>

<div id="groupPosts"></div>
        <div id="groupPosts"></div>
    </div>

    <!-- Модальное окно редактирования группы -->
    <div id="editGroupModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">✏️ Редактировать группу</h3>
            <div class="form-group">
                <label>Название группы</label>
                <input type="text" id="editGroupName" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #cbd5e1;">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="editGroupDesc" rows="3" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #cbd5e1;"></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="saveGroupEditBtn" class="btn btn-primary" style="flex: 1;">Сохранить</button>
                <button id="cancelGroupEditBtn" class="btn btn-secondary" style="flex: 1;">Отмена</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="notifications.js"></script>
    <script>
        var supabase = window.supabase.createClient(
            'https://wydmaatvxutxgvxjknhm.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5ZG1hYXR2eHV0eGd2eGprbmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTU1MjAsImV4cCI6MjA4OTY3MTUyMH0.ZhybOVp98GTHDZxjDXJF4IruDoip0Npf8AKcsimNeC4'
        );

        function getUser() {
            return JSON.parse(localStorage.getItem('currentUser'));
        }

        var currentUser = getUser();
        if (!currentUser) window.location.href = 'login.html';

        var urlParams = new URLSearchParams(window.location.search);
        var groupId = urlParams.get('id');
        var isAdmin = false;

        // Загрузка аватарки
        document.getElementById('avatarInput')?.addEventListener('change', async function(e) {
            var file = e.target.files[0];
            if (!file) return;
            
            var fileName = 'group_' + groupId + '_' + Date.now();
            var { data, error } = await supabase.storage.from('group-avatars').upload(fileName, file);
            if (error) {
                alert('Ошибка загрузки: ' + error.message);
                return;
            }
            
            var { data: urlData } = supabase.storage.from('group-avatars').getPublicUrl(fileName);
            await supabase.from('groups').update({ avatar: urlData.publicUrl }).eq('id', groupId);
            
            alert('✅ Аватарка обновлена');
            loadGroup();
        });

        // Функция создания поста в группе
async function createGroupPost() {
    var text = document.getElementById('groupPostText').value;
    var imageFile = document.getElementById('groupPostImage').files[0];
    
    if (!text && !imageFile) {
        alert('Напишите что-нибудь или добавьте фото');
        return;
    }
    
    var postData = {
        group_id: groupId,
        user_id: currentUser.id,
        text: text || '',
        image: '',
        likes: [],
        comments: [],
        created_at: new Date().toISOString()
    };
    
    if (imageFile) {
        var reader = new FileReader();
        reader.onload = async function(e) {
            postData.image = e.target.result;
            var { error } = await supabase.from('group_posts').insert(postData);
            
            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }
            
            document.getElementById('groupPostText').value = '';
            document.getElementById('groupPostImage').value = '';
            document.getElementById('groupFileName').textContent = 'Файл не выбран';
            await loadGroupPosts(groupId);
            alert('✅ Пост опубликован!');
        };
        reader.readAsDataURL(imageFile);
    } else {
        var { error } = await supabase.from('group_posts').insert(postData);
        
        if (error) {
            alert('Ошибка: ' + error.message);
            return;
        }
        
        document.getElementById('groupPostText').value = '';
        await loadGroupPosts(groupId);
        alert('✅ Пост опубликован!');
    }
}

// Показ имени файла
document.getElementById('groupPostImage')?.addEventListener('change', function(e) {
    var fileName = e.target.files[0]?.name;
    document.getElementById('groupFileName').textContent = fileName || 'Файл не выбран';
});

        async function loadGroup() {
            if (!groupId) {
                document.getElementById('groupContent').innerHTML = '<div class="card">Группа не найдена</div>';
                return;
            }

            var { data: group, error } = await supabase
                .from('groups')
                .select('*')
                .eq('id', groupId)
                .single();

            if (error || !group) {
                document.getElementById('groupContent').innerHTML = '<div class="card">Группа не найдена</div>';
                return;
            }

            // Проверяем, является ли пользователь админом
            var { data: member } = await supabase
                .from('group_members')
                .select('role')
                .eq('group_id', groupId)
                .eq('user_id', currentUser.id)
                .single();
            
            isAdmin = member?.role === 'admin';

            // Получаем участников
            var { data: members } = await supabase
                .from('group_members')
                .select('user_id, role')
                .eq('group_id', groupId);

            var userIds = members?.map(m => m.user_id) || [];
            var { data: users } = await supabase
                .from('users')
                .select('id, full_name, avatar')
                .in('id', userIds);

            var membersHtml = '';
            if (users && users.length > 0) {
                membersHtml = '<h4>👥 Участники (' + users.length + ')</h4><div class="member-list">';
                for (var i = 0; i < users.length; i++) {
                    var u = users[i];
                    var avatarHtml = u.avatar 
                        ? '<img src="' + u.avatar + '" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;">'
                        : '<div style="width: 28px; height: 28px; background: #1e40af; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;">' + u.full_name.charAt(0).toUpperCase() + '</div>';
                    membersHtml += `
                        <div class="member-item" onclick="location.href='profile.html?user=${u.id}'">
                            ${avatarHtml}
                            <span class="member-name">${escapeHtml(u.full_name)}</span>
                        </div>
                    `;
                }
                membersHtml += '</div>';
            }

            var avatarHtml = group.avatar 
                ? '<img src="' + group.avatar + '" style="width: 100%; height: 100%; object-fit: cover;">'
                : '👥';
            
            var adminActions = '';
            if (isAdmin) {
                adminActions = `
                    <div class="group-admin-actions">
                        <button id="editGroupBtn" class="btn btn-secondary">✏️ Редактировать</button>
                        <button id="deleteGroupBtn" class="btn btn-secondary" style="background: #dc2626; border-color: #dc2626;">🗑️ Удалить группу</button>
                        <label id="uploadAvatarBtn" class="btn btn-secondary" style="cursor: pointer;">📷 Сменить фото
                            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                        </label>
                    </div>
                `;
            }

            // Показываем форму создания поста для участников группы
            var createPostForm = document.getElementById('createPostForm');
            if (createPostForm) {
                createPostForm.style.display = 'block';
                document.getElementById('createGroupPostBtn').onclick = createGroupPost;
            }

            document.getElementById('groupContent').innerHTML = `
                <div class="group-header">
                    <div class="group-avatar-large" id="groupAvatar">
                        ${avatarHtml}
                        ${isAdmin ? '<div class="avatar-overlay">Сменить</div>' : ''}
                    </div>
                    <div>
                        <h1 class="group-name">${escapeHtml(group.name)} ${isAdmin ? '<span class="edit-icon" id="editNameIcon">✏️</span>' : ''}</h1>
                        <p style="margin: 10px 0; color: #64748b;">${escapeHtml(group.description || 'Нет описания')}</p>
                    </div>
                    <div class="group-stats">
                        <div class="stat">
                            <div class="stat-number">${members?.length || 0}</div>
                            <div class="stat-label">участников</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">0</div>
                            <div class="stat-label">постов</div>
                        </div>
                    </div>
                    ${membersHtml}
                    ${adminActions}
                </div>
            `;

            // Обработчики для админа
            if (isAdmin) {
                document.getElementById('editGroupBtn').onclick = openEditModal;
                document.getElementById('deleteGroupBtn').onclick = deleteGroup;
                document.getElementById('uploadAvatarBtn').onclick = () => document.getElementById('avatarInput').click();
                document.getElementById('editNameIcon').onclick = openEditModal;
                document.getElementById('groupAvatar').onclick = () => document.getElementById('avatarInput').click();
                
                document.getElementById('avatarInput').onchange = uploadAvatar;
            }

            await loadGroupPosts(groupId);
        }

        function openEditModal() {
            document.getElementById('editGroupName').value = document.querySelector('.group-name')?.innerText.replace('✏️', '').trim();
            document.getElementById('editGroupDesc').value = document.querySelector('.group-header p')?.innerText || '';
            document.getElementById('editGroupModal').style.display = 'flex';
        }

        async function saveGroupEdit() {
            var newName = document.getElementById('editGroupName').value.trim();
            var newDesc = document.getElementById('editGroupDesc').value.trim();
            
            if (!newName) {
                alert('Введите название группы');
                return;
            }
            
            var { error } = await supabase
                .from('groups')
                .update({ name: newName, description: newDesc })
                .eq('id', groupId);
            
            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }
            
            document.getElementById('editGroupModal').style.display = 'none';
            alert('✅ Группа обновлена');
            loadGroup();
        }

        async function deleteGroup() {
            if (!confirm('Вы уверены? Удалятся все посты и участники. Это действие нельзя отменить!')) return;
            
            var { error } = await supabase
                .from('groups')
                .delete()
                .eq('id', groupId);
            
            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }
            
            alert('Группа удалена');
            window.location.href = 'groups.html';
        }

        async function uploadAvatar(event) {
            var file = event.target.files[0];
            if (!file) return;
            
            var fileName = 'group_' + groupId + '_' + Date.now();
            var { error: uploadError } = await supabase.storage
                .from('group-avatars')
                .upload(fileName, file);
            
            if (uploadError) {
                alert('Ошибка загрузки: ' + uploadError.message);
                return;
            }
            
            var { data: urlData } = supabase.storage.from('group-avatars').getPublicUrl(fileName);
            await supabase.from('groups').update({ avatar: urlData.publicUrl }).eq('id', groupId);
            
            alert('✅ Аватарка обновлена');
            loadGroup();
        }

        async function loadGroupPosts(groupId) {
    var { data: posts, error } = await supabase
        .from('group_posts')
        .select('*')
        .eq('group_id', groupId)
        .order('created_at', { ascending: false });

    var container = document.getElementById('groupPosts');
    
    if (error || !posts || posts.length === 0) {
        container.innerHTML = '<div class="card" style="text-align: center;">Нет постов в группе. Будьте первым!</div>';
        return;
    }

    var userIds = [...new Set(posts.map(p => p.user_id))];
    var { data: users } = await supabase
        .from('users')
        .select('id, full_name, avatar')
        .in('id', userIds);
    
    var userMap = {};
    users?.forEach(u => userMap[u.id] = u);

    var html = '<h3 style="margin-bottom:15px;">📝 Посты группы</h3>';
    for (var i = 0; i < posts.length; i++) {
        var p = posts[i];
        var author = userMap[p.user_id] || { full_name: 'Пользователь', avatar: null };
        var isOwn = p.user_id === currentUser.id;
        var isLiked = p.likes?.includes(currentUser.id);
        var likesCount = p.likes?.length || 0;
        
        var avatarHtml = author.avatar 
            ? '<img src="' + author.avatar + '" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">'
            : '<div style="width: 40px; height: 40px; background: #1e40af; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">' + author.full_name.charAt(0).toUpperCase() + '</div>';
        
        var imageHtml = p.image ? '<img src="' + p.image + '" onclick="openImageViewer(\'' + p.image + '\')" style="max-width: 100%; max-height: 300px; border-radius: 12px; margin-top: 10px; cursor: pointer;">' : '';
        
        var menuHtml = '';
        if (isOwn || isAdmin) {
            menuHtml = `
                <div style="position: relative;">
                    <button class="post-menu-btn" data-post-id="${p.id}" style="background: none; border: none; cursor: pointer; font-size: 18px; color: #64748b;">⋮</button>
                    <div class="post-menu-dropdown-${p.id}" style="display: none; position: absolute; right: 0; top: 25px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 100; min-width: 100px;">
                        <button class="delete-group-post-btn" data-post-id="${p.id}" style="width: 100%; padding: 8px 12px; text-align: left; background: none; border: none; cursor: pointer; color: #ef4444;">🗑️ Удалить</button>
                    </div>
                </div>
            `;
        }
        
        html += `
            <div class="card" style="margin-bottom: 16px;" data-post-id="${p.id}">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        ${avatarHtml}
                        <div>
                            <div style="font-weight: bold;">${escapeHtml(author.full_name)}</div>
                            <div style="font-size: 12px; color: #64748b;">${formatTime(p.created_at)}</div>
                        </div>
                    </div>
                    ${menuHtml}
                </div>
                <div>${escapeHtml(p.text || '')}</div>
                ${imageHtml}
                <div style="display: flex; gap: 20px; margin-top: 12px; padding-top: 8px; border-top: 1px solid #e2e8f0;">
                    <button class="like-group-post-btn" data-post-id="${p.id}" style="background: none; border: none; cursor: pointer; font-size: 14px; color: ${isLiked ? '#ef4444' : '#64748b'}">
                        ❤️ <span class="like-count-${p.id}">${likesCount}</span>
                    </button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
    
    // Обработчики лайков
    document.querySelectorAll('.like-group-post-btn').forEach(btn => {
        btn.onclick = () => toggleGroupLike(btn.dataset.postId);
    });
    
    // Обработчики меню
    document.querySelectorAll('.post-menu-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            var postId = btn.dataset.postId;
            var dropdown = document.querySelector('.post-menu-dropdown-' + postId);
            if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };
    });
    
    // Обработчики удаления
    document.querySelectorAll('.delete-group-post-btn').forEach(btn => {
        btn.onclick = () => deleteGroupPost(btn.dataset.postId);
    });
}

async function toggleGroupLike(postId) {
    var { data: post } = await supabase
        .from('group_posts')
        .select('likes')
        .eq('id', postId)
        .single();
    
    var likes = post.likes || [];
    if (likes.includes(currentUser.id)) {
        likes = likes.filter(id => id !== currentUser.id);
    } else {
        likes.push(currentUser.id);
    }
    
    await supabase
        .from('group_posts')
        .update({ likes: likes })
        .eq('id', postId);
    
    var likeSpan = document.querySelector('.like-count-' + postId);
    if (likeSpan) likeSpan.textContent = likes.length;
    
    var likeBtn = document.querySelector(`.like-group-post-btn[data-post-id="${postId}"]`);
    if (likeBtn) likeBtn.style.color = likes.includes(currentUser.id) ? '#ef4444' : '#64748b';
}

async function deleteGroupPost(postId) {
    if (!confirm('Удалить пост? Это действие нельзя отменить.')) return;
    
    var { error } = await supabase
        .from('group_posts')
        .delete()
        .eq('id', postId);
    
    if (error) {
        alert('Ошибка: ' + error.message);
        return;
    }
    
    var postElement = document.querySelector(`.card[data-post-id="${postId}"]`);
    if (postElement) postElement.remove();
    alert('✅ Пост удален');
}

        function formatTime(timestamp) {
            var date = new Date(timestamp);
            var now = new Date();
            var diff = now - date;
            if (diff < 60000) return 'только что';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' мин назад';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч назад';
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.openImageViewer = function(imageSrc) {
            var modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.9)';
            modal.style.zIndex = '10000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.cursor = 'pointer';
            
            var img = document.createElement('img');
            img.src = imageSrc;
            img.style.maxWidth = '90%';
            img.style.maxHeight = '90%';
            img.style.objectFit = 'contain';
            
            var closeBtn = document.createElement('button');
            closeBtn.innerHTML = '✕';
            closeBtn.style.position = 'absolute';
            closeBtn.style.top = '20px';
            closeBtn.style.right = '20px';
            closeBtn.style.background = 'none';
            closeBtn.style.border = 'none';
            closeBtn.style.color = 'white';
            closeBtn.style.fontSize = '32px';
            closeBtn.style.cursor = 'pointer';
            
            modal.appendChild(img);
            modal.appendChild(closeBtn);
            document.body.appendChild(modal);
            
            modal.onclick = function(e) {
                if (e.target === modal || e.target === closeBtn) modal.remove();
            };
        };

        loadGroup();

        // Обработчики модального окна
        document.getElementById('saveGroupEditBtn').onclick = saveGroupEdit;
        document.getElementById('cancelGroupEditBtn').onclick = function() {
            document.getElementById('editGroupModal').style.display = 'none';
        };

        // Темная тема
        var themeToggle = document.getElementById('themeToggle');
        var isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
            document.body.classList.add('dark-theme');
            if (themeToggle) themeToggle.textContent = '☀️';
        }
        if (themeToggle) {
            themeToggle.onclick = function() {
                document.body.classList.toggle('dark-theme');
                var isDarkNow = document.body.classList.contains('dark-theme');
                localStorage.setItem('theme', isDarkNow ? 'dark' : 'light');
                themeToggle.textContent = isDarkNow ? '☀️' : '🌙';
            };
        }

        // Выход
        var logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.onclick = function() {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            };
        }
    </script>
</body>
</html>
