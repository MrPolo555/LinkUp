<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - LinkUp</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LinkUp">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="theme-color" content="#1e40af">
    <title>LinkUp</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="theme-color" content="#1e40af">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-left">
            <a href="index.html" class="logo">LinkUp</a>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </div>
        <div class="nav-right">
            <button id="logoutBtn" class="logout-icon">🚪</button>
        </div>
        <div class="nav-center">
            <div class="nav-links">
                <a href="index.html">Лента</a>
                <a href="profile.html">Профиль</a>
                <a href="messages.html">Сообщения</a>
                <a href="requests.html">Заявки</a>
                <div class="notifications-badge" id="notificationsBtn">
                    🔔
                    <span id="notificationsCount">0</span>
                    <div id="notificationsDropdown" class="notifications-dropdown">
                        <div class="notifications-header">Уведомления</div>
                        <div id="notificationsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

    <div class="container">
        <div class="card">
            <h3>Создать пост</h3>
            <textarea id="postText" rows="3" placeholder="Что у вас нового?" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-family: inherit;"></textarea>
            <div style="margin: 10px 0;">
                <label class="photo-upload-btn" style="display: inline-flex; align-items: center; gap: 8px; background: #f1f5f9; border: 1px dashed #1e40af; padding: 10px 16px; border-radius: 30px; cursor: pointer;">
                    📷 Выбрать фото
                    <input type="file" id="postImage" accept="image/*" style="display: none;">
                </label>
                <span id="fileName" style="margin-left: 10px; font-size: 13px; color: #64748b;">Файл не выбран</span>
            </div>
            <button id="createPostBtn" class="btn btn-primary">Опубликовать</button>
        </div>
        <div id="feed"></div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="notifications.js"></script>
    <script>
        // Уведомления
        var notifBtn = document.getElementById('notificationsBtn');
        var notifDropdown = document.getElementById('notificationsDropdown');
        
        if (notifBtn) {
            notifBtn.onclick = function(e) {
                e.stopPropagation();
                if (notifDropdown) {
                    notifDropdown.style.display = notifDropdown.style.display === 'block' ? 'none' : 'block';
                }
            };
            
            document.onclick = function() {
                if (notifDropdown) notifDropdown.style.display = 'none';
            };
        }
        
        // Показываем имя выбранного файла
        var fileInput = document.getElementById('postImage');
        var fileNameSpan = document.getElementById('fileName');
        if (fileInput) {
            fileInput.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    fileNameSpan.textContent = this.files[0].name;
                } else {
                    fileNameSpan.textContent = 'Файл не выбран';
                }
            });
        }
    </script>
<script>
    // ТЕМНАЯ ТЕМА
    var themeToggle = document.getElementById('themeToggle');
    var isDark = localStorage.getItem('theme') === 'dark';
    
    if (isDark) {
        document.body.classList.add('dark-theme');
        if (themeToggle) themeToggle.textContent = '☀️';
    }
    
    if (themeToggle) {
        themeToggle.onclick = function() {
            document.body.classList.toggle('dark-theme');
            var isDarkNow = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDarkNow ? 'dark' : 'light');
            themeToggle.textContent = isDarkNow ? '☀️' : '🌙';
        };
    }
    
    // ВЫХОД - переназначаем кнопку
    var logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.onclick = function() {
            if (window.supabase) {
                window.supabase.auth.signOut();
            }
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        };
    }
</script>
</body>
<script>
    // Регистрация Service Worker для PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
                console.log('✅ Service Worker зарегистрирован:', reg);
            })
            .catch(function(err) {
                console.log('❌ Ошибка регистрации Service Worker:', err);
            });
    }
</script>
<script src="push.js"></script>
</html>
