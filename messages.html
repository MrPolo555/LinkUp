<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сообщения - LinkUp</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="theme-color" content="#1e40af">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">LinkUp</a>
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
            <div class="nav-right">
                <button id="logoutBtn" class="logout-icon">🚪</button>
            </div>
            <div class="nav-center">
                <div class="nav-links">
                    <a href="index.html">Лента</a>
                    <a href="profile.html">Профиль</a>
                    <a href="messages.html">Сообщения</a>
                    <a href="requests.html">Заявки</a>
                    <div class="notifications-badge" id="notificationsBtn">
                        🔔
                        <span id="notificationsCount" class="notifications-count">0</span>
                        <div id="notificationsDropdown" class="notifications-dropdown">
                            <div class="notifications-header">Уведомления</div>
                            <div id="notificationsList" class="notifications-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="messages-layout">
            <!-- Левая колонка: список чатов -->
            <div class="chats-sidebar">
                <div class="chats-header">
                    <h3>💬 Диалоги</h3>
                </div>
                <div class="chats-list" id="chatsList">
                    <div class="empty-state" style="text-align: center; padding: 40px;">Загрузка...</div>
                </div>
            </div>

            <!-- Правая колонка: область сообщений -->
            <div class="messages-area">
                <div class="chat-header" id="chatHeader">
                    <h3>Выберите диалог</h3>
                </div>
                <div class="messages-list" id="messagesList">
                    <div class="empty-state">👈 Выберите чат слева</div>
                </div>
                <div class="message-input-area" id="messageInputArea" style="display: none;">
                    <div class="message-input-group">
                        <input type="text" id="messageInput" class="message-input" placeholder="Напишите сообщение...">
                        <button id="sendBtn" class="send-btn">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js?v=3"></script>
    <script src="script.js?v=3"></script>
    <script src="notifications.js?v=3"></script>
    <script>
        // ТЕМНАЯ ТЕМА
        var themeToggle = document.getElementById('themeToggle');
        var isDark = localStorage.getItem('theme') === 'dark';
        
        if (isDark) {
            document.body.classList.add('dark-theme');
            if (themeToggle) themeToggle.textContent = '☀️';
        }
        
        if (themeToggle) {
            themeToggle.onclick = function() {
                document.body.classList.toggle('dark-theme');
                var isDarkNow = document.body.classList.contains('dark-theme');
                localStorage.setItem('theme', isDarkNow ? 'dark' : 'light');
                themeToggle.textContent = isDarkNow ? '☀️' : '🌙';
            };
        }
        
        // УВЕДОМЛЕНИЯ
        var notifBtn = document.getElementById('notificationsBtn');
        var notifDropdown = document.getElementById('notificationsDropdown');
        
        if (notifBtn) {
            notifBtn.onclick = function(e) {
                e.stopPropagation();
                if (notifDropdown) {
                    notifDropdown.classList.toggle('show');
                }
            };
            document.onclick = function() {
                if (notifDropdown) notifDropdown.classList.remove('show');
            };
        }
        
        // ВЫХОД
        var logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.onclick = function() {
                if (window.supabase) {
                    window.supabase.auth.signOut();
                }
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            };
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
    eruda.init();
    console.log('✅ Eruda консоль готова!');
</script>
</body>
</html>
