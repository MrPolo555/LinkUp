<!-- register.html - ИСПРАВЛЕННЫЙ -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - LinkUp</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LinkUp">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="theme-color" content="#1e40af">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="theme-color" content="#1e40af">
</head>
<body>
    <div class="container" style="max-width: 400px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя и фамилия</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
                <div id="successMessage" class="alert alert-success" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
<script>
    // Регистрация Service Worker для PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
                console.log('✅ Service Worker зарегистрирован:', reg);
            })
            .catch(function(err) {
                console.log('❌ Ошибка регистрации Service Worker:', err);
            });
    }
</script>
</html>
